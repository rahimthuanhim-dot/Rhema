<script>
/*
  ── NOTICE BOARD INTEGRATION ──────────────────────────────────────────
  Plug in your Google Apps Script Web App URL below. Expected pattern
  (same as the Sharon English High School notice board):

  1. Google Form collects notices (title, date, body) into a Sheet.
  2. An Apps Script Web App (deployed with "Anyone" access) reads that
     Sheet and returns JSON, e.g.:
     [
       { "title": "Term exam schedule", "date": "2026-08-01", "body": "..." },
       ...
     ]
  3. This page fetches that URL and renders the list below.

  Until you deploy the script, this falls back to the SAMPLE_NOTICES
  array so the page never looks broken during setup.
*/
const NOTICE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzGI0CcScfGbMbJCycdUD8cNpheQbA3unHw05N4LMdlUWq0aQ4nFvLRwE4nnfLyTzBanA/exec"; // <-- paste your Apps Script Web App URL here

const SAMPLE_NOTICES = [
  { title: "Sample notice — replace with live data", date: "2026-07-19", body: "Once NOTICE_SCRIPT_URL is set, notices submitted through the Google Form will appear here automatically, newest first." }
];

// Your Apps Script returns { id, title, content, target_audience, created_at, expires_at }.
// Normalize that into { title, date, body, audience, expiresAt } so the rest of this
// file has one consistent shape to work with, regardless of which key names the
// backend happens to use.
function normalizeNotice(raw) {
  return {
    title: raw.title ?? "Untitled notice",
    body: raw.content ?? raw.body ?? "",
    date: raw.created_at ?? raw.date ?? "",
    audience: raw.target_audience ?? "",
    expiresAt: raw.expires_at ?? null
  };
}

async function loadNotices() {
  const statusEl = document.getElementById('notice-status');
  const listEl = document.getElementById('notice-list');
  let notices = SAMPLE_NOTICES;

  if (NOTICE_SCRIPT_URL) {
    try {
      const res = await fetch(NOTICE_SCRIPT_URL);
      if (!res.ok) throw new Error('Bad response');
      const data = await res.json();
      if (Array.isArray(data) && data.length) notices = data;
      statusEl.remove();
    } catch (err) {
      statusEl.textContent = "Couldn't reach the notice feed — showing a placeholder.";
    }
  } else {
    statusEl.textContent = "Notice feed not connected yet — showing a placeholder.";
  }

  const now = new Date();

  notices
    .map(normalizeNotice)
    // drop notices that have expired, if an expiry was set
    .filter(n => !n.expiresAt || new Date(n.expiresAt) > now)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .forEach(n => {
      const dateLabel = n.date ? new Date(n.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      const card = document.createElement('div');
      card.className = 'ledger-card p-5';
      card.innerHTML = `
        <div class="flex justify-between items-baseline gap-4 mb-2">
          <div class="flex items-center gap-3">
            <p class="font-display text-lg">${n.title}</p>
            ${n.audience ? `<span class="eyebrow text-ochre-500 text-[0.65rem]">${n.audience}</span>` : ''}
          </div>
          <p class="font-mono text-xs text-ink-900/50 whitespace-nowrap">${dateLabel}</p>
        </div>
        <p class="text-ink-900/80">${n.body}</p>
      `;
      listEl.appendChild(card);
    });

  if (!listEl.children.length) {
    listEl.innerHTML = `<p class="text-ink-900/50">No current notices.</p>`;
  }
}
loadNotices();
</script>
